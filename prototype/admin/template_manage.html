<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>템플릿 등록관리</title>
  <link rel="stylesheet" href="./css/common.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">
</head>
<body data-page="template_manage">
  <div class="app">
  <aside class="sidebar" data-include="./includes/sidebar.html"></aside>
<main>
      <header class="topbar"><strong>템플릿 등록관리</strong><span>윤호님 · 로그아웃</span></header>
      <div class="page">
        <div class="page-head">
          <div>
            <h1>템플릿 등록관리</h1>
            <div class="desc">상품등록 화면에서 사용하는 상세안내, 이용안내, 취소/환불 규정, 선택관광/쇼핑, 숙소정보 템플릿을 카테고리별로 관리합니다.</div>
          </div>
          <a class="btn" href="product_register.html">상품등록으로</a>
        </div>

        <div class="layout">
          <section class="panel">
            <div class="panel-head"><span>템플릿 카테고리</span><span class="badge">템플릿 존재 시 삭제 불가</span></div>
            <div class="panel-body">
              <div id="categoryList" class="category-list">
                <div class="category-item active" data-count="8" onclick="selectCategory(this)"><span class="category-name">포함사항</span><span class="category-count">8개</span></div>
                <div class="category-item" data-count="5" onclick="selectCategory(this)"><span class="category-name">불포함사항</span><span class="category-count">5개</span></div>
                <div class="category-item" data-count="4" onclick="selectCategory(this)"><span class="category-name">상세안내</span><span class="category-count">4개</span></div>
                <div class="category-item" data-count="3" onclick="selectCategory(this)"><span class="category-name">이용안내</span><span class="category-count">3개</span></div>
                <div class="category-item" data-count="2" onclick="selectCategory(this)"><span class="category-name">취소/환불 규정</span><span class="category-count">2개</span></div>
                <div class="category-item" data-count="1" onclick="selectCategory(this)"><span class="category-name">선택관광/쇼핑</span><span class="category-count">1개</span></div>
                <div class="category-item" data-count="1" onclick="selectCategory(this)"><span class="category-name">숙소정보</span><span class="category-count">1개</span></div>
              </div>
              <p class="hint">카테고리는 템플릿 적용 영역 기준으로 고정 관리합니다. 좌측 카테고리를 선택하면 해당 템플릿 목록을 조회합니다.</p>
            </div>
          </section>

          <section class="panel">
            <div class="panel-head"><span>템플릿 목록 및 등록</span><button class="btn small green" onclick="saveTemplate()">저장</button></div>
            <div class="panel-body">
              <div class="filter-row">
                <select id="filterCategory" onchange="filterTemplates()"><option>포함사항</option><option>불포함사항</option><option>상세안내</option><option>이용안내</option><option>취소/환불 규정</option><option>선택관광/쇼핑</option><option>숙소정보</option></select>
                <input id="templateSearch" placeholder="템플릿명 검색">
                <button class="btn" onclick="filterTemplates()">검색</button>
              </div>

              <div class="work-grid">
                <div>
                  <table class="table">
                    <thead><tr><th>템플릿명</th><th>관리</th></tr></thead>
                    <tbody id="templateTable">
                      <tr data-category="포함사항" data-content="왕복 교통비&#10;가이드&#10;기본 입장료"><td><button class="template-link" onclick="editTemplateRow(this)">버스여행 포함사항 기본</button></td><td class="center"><button class="btn small red" onclick="deleteTemplateRow(this)">삭제</button></td></tr>
                      <tr data-category="포함사항" data-content="열차비&#10;연계버스&#10;현지 가이드"><td><button class="template-link" onclick="editTemplateRow(this)">기차여행 포함사항 기본</button></td><td class="center"><button class="btn small red" onclick="deleteTemplateRow(this)">삭제</button></td></tr>
                      <tr data-category="포함사항" data-content="식사 1회&#10;관광지 입장권&#10;여행자보험"><td><button class="template-link" onclick="editTemplateRow(this)">당일여행 포함사항</button></td><td class="center"><button class="btn small red" onclick="deleteTemplateRow(this)">삭제</button></td></tr>
                    </tbody>
                  </table>
                </div>

                <div class="template-form">
                  <div><span id="editModeBadge" class="badge mode-badge">신규등록</span></div>
                  <div class="form-row">
                    <div><label>카테고리</label><select id="formCategory"><option>포함사항</option><option>불포함사항</option><option>상세안내</option><option>이용안내</option><option>취소/환불 규정</option><option>선택관광/쇼핑</option><option>숙소정보</option></select></div>
                    <div><label>템플릿명</label><input id="formTemplateName" value=""></div>
                  </div>
                  <div>
                    <label>템플릿 내용</label>
                    <div class="editor-toolbar"><span>파일</span><span>편집</span><span>보기</span><span>삽입</span><span>서식</span><span>표</span><span>B</span><span>I</span><span>링크</span></div>
                    <textarea id="formTemplateContent" class="template-editor"></textarea>
                  </div>
                  <div class="u-style-54c2afb7"><button class="btn" onclick="resetTemplateForm()">신규등록</button> <button class="btn green" onclick="saveTemplate()">변경내용 저장</button></div>
                </div>
              </div>
            </div>
          </section>
        </div>
      </div>
    </main>
  </div>
  <script src="./js/common.js"></script>
  <script src="./js/components.js"></script>
</body>
</html>
