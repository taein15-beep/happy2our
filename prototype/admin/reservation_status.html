<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>예약현황</title>
  <link rel="stylesheet" href="./css/common.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">
</head>
<body data-page="reservation_status">
  <div class="app">
  <aside class="sidebar" data-include="./includes/sidebar.html"></aside>
<main>
      <header class="topbar"><strong>예약현황</strong><span>윤호님 · 로그아웃</span></header>
      <div class="page">
        <div class="page-head">
          <div>
            <h1>예약현황</h1>
            <div class="desc">월간 달력에서 날짜와 상태를 선택해 예약 리스트를 빠르게 확인합니다.</div>
          </div>
          <div class="summary-strip" aria-label="현황 요약">
            <span class="summary-chip">접수 31명</span>
            <span class="summary-chip">출발 78명</span>
            <span class="summary-chip">대기 14명</span>
            <span class="summary-chip">취소 6명</span>
            <span class="summary-chip">미입금 <span class="unpaid">9건</span></span>
          </div>
        </div>

        <section class="panel">
          <div class="panel-head">검색 필터</div>
          <div class="panel-body">
            <div class="filter-grid">
              <div class="field"><label for="processStatus">처리상태</label><select id="processStatus"><option>전체</option><option selected>접수</option><option>확정</option><option>대기</option><option>취소</option><option>완료</option></select></div>
              <div class="field"><label for="paymentStatus">입금상태</label><select id="paymentStatus"><option>전체</option><option>미입금</option><option>일부입금</option><option>입금완료</option><option>환불대기</option><option>환불완료</option></select></div>
              <div class="field"><label for="settlementStatus">정산상태</label><select id="settlementStatus"><option>전체</option><option>미정산</option><option>정산대기</option><option>정산완료</option><option>보류</option></select></div>
              <div class="field"><label for="category1">상품분류 대분류</label><select id="category1"><option>대분류</option><option>국내여행</option><option>지자체지원</option><option>테마여행</option></select></div>
              <div class="field"><label for="category2">상품분류 중분류</label><select id="category2"><option>중분류</option><option>당일여행</option><option>1박2일</option><option>체험여행</option></select></div>
              <div class="field"><label for="category3">상품분류 소분류</label><select id="category3"><option>소분류</option><option>수도권</option><option>강화</option><option>남이섬</option></select></div>
              <div class="field search">
                <label for="searchType">검색항목</label>
                <div class="search-combo">
                  <select id="searchType"><option>상품명</option><option>예약번호</option><option>예약자명</option><option>연락처</option><option>판매점</option><option>담당자</option></select>
                  <input id="searchKeyword" placeholder="검색어 입력">
                </div>
              </div>
              <div class="field actions">
                <button class="btn green" onclick="applySearch()">검색</button>
                <button class="btn" onclick="resetSearch()">초기화</button>
                <button class="btn blue" onclick="msg('현재 조건 기준으로 엑셀을 다운로드합니다.')">엑셀다운로드</button>
              </div>
            </div>
          </div>
        </section>

        <div class="content-grid">
          <section class="panel">
            <div class="panel-head">
              <div class="calendar-toolbar">
                <div class="calendar-nav">
                  <button class="btn small" onclick="msg('이전달 샘플 이동입니다.')">이전달</button>
                  <button class="btn small" onclick="selectDate('2026-06-22')">오늘</button>
                  <button class="btn small" onclick="msg('다음달 샘플 이동입니다.')">다음달</button>
                </div>
                <span class="current-month">2026년 6월</span>
              </div>
              <div class="view-toggle" aria-label="표시 기준">
                <button id="peopleModeBtn" class="btn small active" onclick="setCountMode('people')">인원 기준</button>
                <button id="caseModeBtn" class="btn small" onclick="setCountMode('case')">건수 기준</button>
              </div>
            </div>
            <div class="panel-body">
              <div class="calendar" id="calendar">
                <div class="weekday">일</div><div class="weekday">월</div><div class="weekday">화</div><div class="weekday">수</div><div class="weekday">목</div><div class="weekday">금</div><div class="weekday">토</div>
              </div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-head list-head">
              <span>예약 리스트</span>
              <span id="selectedCondition" class="selected-condition"><span class="selected-date">2026-06-25</span> / 접수 예약 / 총 12명</span>
            </div>
            <div class="table-wrap">
              <table class="table reservation-list-table">
                <thead>
                  <tr><th>예약번호</th><th>예약자명/연락처</th><th>상품명</th><th>인원</th><th>예약일</th><th>판매점</th></tr>
                </thead>
                <tbody id="reservationRows"></tbody>
              </table>
              <div id="emptyRows" class="empty u-style-6b99de8b">선택 조건에 해당하는 예약이 없습니다.</div>
            </div>
          </section>
        </div>
      </div>
    </main>
  </div>
  <script src="./js/common.js"></script>
  <script src="./js/components.js"></script>
</body>
</html>
