<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>홈페이지 팝업 미리보기</title>
  <style>
    body{margin:0;font-family:"Malgun Gothic","Noto Sans KR",Arial,sans-serif;background:#f8fafc;color:#172033}.site-header{height:64px;background:#071122;color:white;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:20}.site-header a{color:white;text-decoration:none;margin-left:18px;font-weight:700}.hero{min-height:520px;display:grid;place-items:center;text-align:center;background:linear-gradient(135deg,#eaf1ff,#fff)}.hero h1{font-size:46px;margin:0 0 16px}.hero p{font-size:18px;color:#475467}.section{padding:70px 28px;max-width:1100px;margin:0 auto}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.card{background:white;border:1px solid #d9dde3;border-radius:10px;padding:24px;box-shadow:0 8px 20px rgba(16,24,40,.06)}.tools{position:fixed;right:18px;bottom:18px;z-index:7000;display:flex;gap:8px;align-items:center;flex-wrap:wrap}.tools button,.tools a{border:1px solid #cfd5dd;background:white;color:#172033;text-decoration:none;border-radius:6px;padding:10px 14px;font-weight:900;cursor:pointer}.tools button.active{background:#2563eb;border-color:#2563eb;color:white}.position-status{background:rgba(7,17,34,.82);color:#fff;border-radius:6px;padding:10px 12px;font-size:12px;font-weight:900}.home-popup.position-edit{outline:2px dashed #2563eb;outline-offset:4px;cursor:move}.home-popup.position-edit:before{content:"드래그로 위치 조정";position:absolute;left:10px;top:-32px;background:#2563eb;color:#fff;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;box-shadow:0 8px 20px rgba(37,99,235,.28)}.home-popup.dragging{opacity:.9;box-shadow:0 26px 70px rgba(37,99,235,.36)}.popup-root{position:fixed;inset:0;z-index:5000;pointer-events:none}.home-popup{position:fixed;z-index:5001;background:#fff;border:1px solid rgba(15,23,42,.1);border-radius:10px;box-shadow:0 20px 60px rgba(15,23,42,.32);overflow:hidden;display:flex;flex-direction:column;pointer-events:auto}.home-popup-body{position:relative;flex:1;overflow:hidden}.home-popup-body img{width:100%;height:100%;object-fit:cover;display:block}.home-popup-content{height:100%;box-sizing:border-box;padding:32px;display:flex;flex-direction:column;justify-content:center;gap:14px;background-size:cover;background-position:center}.home-popup-content h3{margin:0;font-size:24px;line-height:1.3}.home-popup-content p{margin:0;line-height:1.7;white-space:pre-wrap}.home-popup-content a{align-self:center;background:#2563eb;color:#fff;text-decoration:none;border-radius:999px;padding:10px 20px;font-weight:900}.home-popup-footer{display:flex;justify-content:space-between;align-items:center;gap:10px;min-height:42px;padding:8px 12px;border-top:1px solid rgba(15,23,42,.1);background:rgba(255,255,255,.96);font-size:13px}.home-popup-x{position:absolute;top:10px;right:10px;width:30px;height:30px;border:0;border-radius:999px;background:rgba(15,23,42,.72);color:white;font-size:20px;cursor:pointer}.home-popup-close{border:0;background:#111827;color:white;min-width:52px;min-height:28px;border-radius:6px;font-weight:900;cursor:pointer}@media(max-width:767px){.grid{grid-template-columns:1fr}.hero h1{font-size:32px}.home-popup{max-width:90vw!important;left:50%!important;transform:translateX(-50%)}}
  </style>
</head>
<body>
  <header class="site-header"><strong>AviaNext Homepage Preview</strong><nav><a href="popup_manage.html">팝업관리</a><a href="#contact">문의하기</a></nav></header>
  <section class="hero"><div><h1>Homepage Popup Preview</h1><p>관리자 팝업 데이터가 홈페이지 내부 레이어 팝업으로 표시되는 화면입니다.</p></div></section>
  <section class="section"><h2>검증 영역</h2><div class="grid"><div class="card"><h3>다중 팝업</h3><p>정렬순서가 낮은 팝업부터 배치됩니다.</p></div><div class="card"><h3>겹침 방지</h3><p>같은 위치의 팝업은 옆 또는 아래로 자동 이동합니다.</p></div><div class="card"><h3>모바일 대응</h3><p>모바일은 화면 가로 90% 이하로 순차 배치됩니다.</p></div></div></section>
  <section class="section" id="contact"><h2>Contact</h2><p>버튼 링크 또는 이미지 링크 테스트용 앵커입니다.</p></section>
  <div class="tools"><button id="positionEditBtn" onclick="togglePositionEdit()">위치수정 켜기</button><span id="positionStatus" class="position-status">위치수정 꺼짐</span><button onclick="clearPopupHide()">오늘숨김 초기화</button><button onclick="renderPopups()">팝업 다시보기</button><a href="popup_manage.html">관리자 이동</a></div>
<script>
const STORAGE_KEY='aosPopupManagerData';const HIDE_PREFIX='aosPopupHideToday.';const GAP=16;let positionEdit=false;
function todayKey(){return new Date().toISOString().slice(0,10)}
function isMobile(){return matchMedia('(max-width: 767px)').matches}
function num(v,f){const n=Number(v);return Number.isFinite(n)?n:f}
function esc(v){return String(v??'').replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]))}
function nowLocal(offsetDays=0){const d=new Date();d.setDate(d.getDate()+offsetDays);d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,16)}
function defaultPopups(){return[{id:'popup-demo-1',title:'AOS 안내',popupName:'메인 안내 팝업',popupType:'imageText',isActive:true,startDateTime:nowLocal(-1),endDateTime:nowLocal(30),displayDevice:'all',positionPreset:'center',positionX:0,positionY:0,pcWidth:460,pcHeight:420,mobileWidth:340,mobileHeight:410,imageUrl:'',backgroundImageUrl:'',altText:'',contentTitle:'AOS 팝업관리 테스트',contentText:'관리자에서 등록한 팝업이 홈페이지 내부 레이어로 표시됩니다.',textAlign:'center',textColor:'#ffffff',backgroundColor:'#0f172a',buttonEnabled:true,buttonText:'문의하기',buttonLink:'#contact',imageLink:'',linkTargetBlank:false,buttonTargetBlank:false,closeButtonEnabled:true,hideTodayEnabled:true,sortOrder:1,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()},{id:'popup-demo-2',title:'텍스트 공지',popupName:'하단 텍스트 팝업',popupType:'text',isActive:true,startDateTime:nowLocal(-1),endDateTime:nowLocal(30),displayDevice:'all',positionPreset:'rightBottom',positionX:-24,positionY:-24,pcWidth:360,pcHeight:260,mobileWidth:320,mobileHeight:260,imageUrl:'',backgroundImageUrl:'',altText:'',contentTitle:'오늘의 공지',contentText:'여러 팝업이 동시에 노출될 때 자동으로 겹침을 보정합니다.',textAlign:'left',textColor:'#172033',backgroundColor:'#f8fafc',buttonEnabled:false,buttonText:'',buttonLink:'',imageLink:'',linkTargetBlank:false,buttonTargetBlank:false,closeButtonEnabled:true,hideTodayEnabled:true,sortOrder:2,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()}]}
function loadPopups(){const raw=localStorage.getItem(STORAGE_KEY);if(!raw){const rows=defaultPopups();savePopups(rows);return rows}try{return JSON.parse(raw)||[]}catch(e){return[]}}
function savePopups(rows){localStorage.setItem(STORAGE_KEY,JSON.stringify(rows))}
function hideKey(p){return HIDE_PREFIX+p.id+'.'+(p.updatedAt||'')}
function deviceAllowed(p){return p.displayDevice==='pc'?!isMobile():p.displayDevice==='mobile'?isMobile():true}
function activeNow(p){const now=Date.now();return !!p.isActive&&new Date(p.startDateTime).getTime()<=now&&now<=new Date(p.endDateTime).getTime()}
function hiddenToday(p){return localStorage.getItem(hideKey(p))===todayKey()}
function basePosition(p,w,h){const vw=innerWidth,vh=innerHeight,m=isMobile()?12:24;return{leftTop:[m,m],topCenter:[(vw-w)/2,m],rightTop:[vw-w-m,m],center:[(vw-w)/2,(vh-h)/2],leftBottom:[m,vh-h-m],bottomCenter:[(vw-w)/2,vh-h-m],rightBottom:[vw-w-m,vh-h-m]}[p.positionPreset]||[(vw-w)/2,(vh-h)/2]}
function overlap(a,b){return!(a.left+a.width+GAP<=b.left||b.left+b.width+GAP<=a.left||a.top+a.height+GAP<=b.top||b.top+b.height+GAP<=a.top)}
function layouts(popups){if(isMobile()){let top=18,maxW=Math.floor(innerWidth*.9);return popups.map(p=>{const width=Math.min(num(p.mobileWidth,320),maxW),height=Math.min(num(p.mobileHeight,360),Math.max(180,innerHeight-36)),rect={left:(innerWidth-width)/2,top,width,height};top=Math.min(top+height+14,Math.max(18,innerHeight-height-18));return{p,rect}})}const placed=[];return popups.map(p=>{const width=num(p.pcWidth,420),height=num(p.pcHeight,360);let [left,top]=basePosition(p,width,height);left=Math.min(Math.max(GAP,left+num(p.positionX,0)),innerWidth-width-GAP);top=Math.min(Math.max(GAP,top+num(p.positionY,0)),innerHeight-height-GAP);let rect={left,top,width,height},guard=0;while(placed.some(x=>overlap(rect,x))&&guard<80){left+=width+GAP;if(left+width>innerWidth-GAP){left=GAP;top+=height+GAP}if(top+height>innerHeight-GAP)top=GAP+(guard*12)%Math.max(60,innerHeight-height-GAP);rect={left:Math.min(Math.max(GAP,left),innerWidth-width-GAP),top:Math.min(Math.max(GAP,top),innerHeight-height-GAP),width,height};guard++}placed.push(rect);return{p,rect}})}
function linkAttrs(blank){return blank?' target="_blank" rel="noopener noreferrer"':''}
function popupEl(item,i){const p=item.p,r=item.rect,el=document.createElement('div');el.className='home-popup';el.style.cssText=`left:${r.left}px;top:${r.top}px;width:${r.width}px;height:${r.height}px;z-index:${5001+i}`;let body='';if(p.popupType==='image'){const img=`<img src="${p.imageUrl}" alt="${esc(p.altText||p.popupName)}">`;body=p.imageLink?`<a href="${p.imageLink}"${linkAttrs(p.linkTargetBlank)}>${img}</a>`:img}else{const bg=p.popupType==='imageText'&&p.backgroundImageUrl?`background-image:linear-gradient(rgba(0,0,0,.32),rgba(0,0,0,.32)),url('${p.backgroundImageUrl}');`:'';body=`<div class="home-popup-content" style="${bg}background-color:${p.backgroundColor||'#fff'};color:${p.textColor||'#111827'};text-align:${p.textAlign||'center'}"><h3>${esc(p.contentTitle||p.popupName)}</h3><p>${esc(p.contentText||'')}</p>${p.buttonEnabled&&p.buttonText&&p.buttonLink?`<a href="${p.buttonLink}"${linkAttrs(p.buttonTargetBlank)}>${esc(p.buttonText)}</a>`:''}</div>`}el.innerHTML=`<div class="home-popup-body">${p.closeButtonEnabled?'<button class="home-popup-x" aria-label="닫기">×</button>':''}${body}</div><div class="home-popup-footer">${p.hideTodayEnabled?'<label><input type="checkbox"> 오늘 하루 보지 않기</label>':'<span></span>'}<button class="home-popup-close">닫기</button></div>`;const close=()=>{if(el.querySelector('label input')?.checked)localStorage.setItem(hideKey(p),todayKey());el.remove()};el.querySelector('.home-popup-close').onclick=close;el.querySelector('.home-popup-x')?.addEventListener('click',close);bindPopupDrag(el,p,r);return el}
function clamp(v,min,max){return Math.min(Math.max(min,v),max)}
function setPositionStatus(text){const el=document.getElementById('positionStatus');if(el)el.textContent=text}
function togglePositionEdit(){positionEdit=!positionEdit;document.getElementById('positionEditBtn').classList.toggle('active',positionEdit);document.getElementById('positionEditBtn').textContent=positionEdit?'위치수정 끄기':'위치수정 켜기';setPositionStatus(positionEdit?(isMobile()?'모바일은 중앙 순차 배치됩니다':'팝업을 드래그하면 위치가 저장됩니다'):'위치수정 꺼짐');document.querySelectorAll('.home-popup').forEach(el=>el.classList.toggle('position-edit',positionEdit&&!isMobile()))}
function savePopupPosition(p,left,top,width,height){const rows=loadPopups();const target=rows.find(row=>row.id===p.id);if(!target)return;const oldX=num(target.positionX,0),oldY=num(target.positionY,0);target.positionX=0;target.positionY=0;const base=basePosition(target,width,height);target.positionX=Math.round(left-base[0]);target.positionY=Math.round(top-base[1]);target.updatedAt=new Date().toISOString();savePopups(rows);setPositionStatus(`${target.popupName||target.title||'팝업'} 위치 저장: X ${target.positionX}, Y ${target.positionY}`);p.positionX=target.positionX;p.positionY=target.positionY;p.updatedAt=target.updatedAt;if(oldX!==target.positionX||oldY!==target.positionY)console.log('popup position saved',target.id,target.positionX,target.positionY)}
function bindPopupDrag(el,p,r){let drag=null;el.addEventListener('mousedown',e=>{if(!positionEdit||isMobile())return;if(e.target.closest('button,a,input,label'))return;drag={x:e.clientX,y:e.clientY,left:el.offsetLeft,top:el.offsetTop,width:el.offsetWidth,height:el.offsetHeight};el.classList.add('dragging');e.preventDefault()});document.addEventListener('mousemove',e=>{if(!drag)return;const left=clamp(drag.left+e.clientX-drag.x,GAP,innerWidth-drag.width-GAP);const top=clamp(drag.top+e.clientY-drag.y,GAP,innerHeight-drag.height-GAP);el.style.left=left+'px';el.style.top=top+'px'});document.addEventListener('mouseup',()=>{if(!drag)return;el.classList.remove('dragging');savePopupPosition(p,el.offsetLeft,el.offsetTop,drag.width,drag.height);drag=null})}
function renderPopups(){document.querySelector('.popup-root')?.remove();const rows=loadPopups().filter(p=>activeNow(p)&&deviceAllowed(p)&&!hiddenToday(p)).sort((a,b)=>num(a.sortOrder,999)-num(b.sortOrder,999));const root=document.createElement('div');root.className='popup-root';document.body.appendChild(root);layouts(rows).forEach((item,i)=>root.appendChild(popupEl(item,i)));document.querySelectorAll('.home-popup').forEach(el=>el.classList.toggle('position-edit',positionEdit&&!isMobile()))}
function clearPopupHide(){Object.keys(localStorage).filter(k=>k.startsWith(HIDE_PREFIX)).forEach(k=>localStorage.removeItem(k));renderPopups()}
addEventListener('DOMContentLoaded',renderPopups);
</script>
</body>
</html>
