<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>상품상세 - 요금설정</title>
  <link rel="stylesheet" href="./css/common.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">
</head>
<body data-page="price_setting">
<div class="app">
  <aside class="sidebar" data-include="./includes/sidebar.html"></aside>
<main>
    <header class="topbar"><strong>상품상세</strong><span>윤호님 · 로그아웃</span></header>
    <div class="page">
      <div class="page-head">
        <div><h1>상품상세</h1><div class="desc">대표요금 기준으로 날짜별 판매요금과 선택 옵션을 관리합니다.</div></div>
        <button class="btn green" onclick="saveAll()">저장</button>
      </div>
      <nav class="tabs" aria-label="상품 관리 탭">
        <a class="tab" href="product_detail.html">상품기본설정</a>
        <a class="tab" href="schedule_register.html">일정표</a>
        <a class="tab active" href="price_setting.html">요금설정</a>
        <a class="tab" href="#" onclick="msg('판매점설정 샘플입니다.');return false;">판매점설정</a>
        <a class="tab" href="#" onclick="msg('거래처설정 샘플입니다.');return false;">거래처설정</a>
      </nav>

      <div class="layout">
        <div>
          <section class="panel">
            <div class="panel-head">기본요금</div>
            <div class="panel-body">
              <div id="basePriceGrid" class="basic-grid"></div>
              <div class="basic-meta">
                <div class="field"><label>여행기간 / 숙박</label><input readonly value="2일 / 2인1실, 3인1실, 4인1실"></div>
                <div class="field"><label>출발확정/예약마감 기준</label><div class="inline"><input readonly value="2명 이상 → 출발확정"><input readonly value="30명 이상 → 예약마감"></div></div>
              </div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-head"><span>날짜별 요금</span><button class="btn green small" onclick="openRateModal()">요금추가</button></div>
            <div class="table-wrap">
              <table class="table">
                <thead><tr id="rateHead"></tr></thead>
                <tbody id="rateBody"></tbody>
              </table>
            </div>
          </section>

          <section class="panel">
            <div class="panel-head"><span>옵션</span><button class="btn green small" onclick="openOptionModal()">옵션추가</button></div>
            <div class="table-wrap">
              <table class="table">
                <thead><tr><th>노출순위</th><th>옵션명</th><th>옵션항목</th><th>계산방식</th><th>필수여부</th><th>삭제</th></tr></thead>
                <tbody id="optionBody"></tbody>
              </table>
            </div>
          </section>
        </div>

        <aside class="panel preview-panel">
          <div class="panel-head">요금 미리보기</div>
          <div class="panel-body">
            <div class="preview-row">
              <div class="field"><label>출발일</label><input id="previewDate" type="date" value="2026-09-24"></div>
              <div class="field"><label>숙박타입</label><select id="previewStayType"></select></div>
            </div>
            <div id="previewPeople" class="preview-row u-style-8a77e5a3"></div>
            <div class="field full u-style-8a77e5a3"><label>선택 옵션</label><div id="previewOptions"></div></div>
            <button class="btn blue u-style-9202fe4c" onclick="calculatePreview()">요금계산하기</button>
            <div id="previewResult" class="calc-box"><span class="hint">조건을 선택한 뒤 계산해주세요.</span></div>
          </div>
        </aside>
      </div>
      <div class="save-bar"><span class="hint">상품상세 상단 탭 구조와 저장 버튼 위치는 유지됩니다.</span><button class="btn green" onclick="saveAll()">저장</button></div>
    </div>
  </main>
</div>

<div id="rateModal" class="modal-backdrop">
  <div class="modal-box">
    <div class="modal-head"><span>날짜별 요금추가</span></div>
    <div class="modal-body">
      <table class="rate-config-table">
        <tr>
          <th>적용구분</th>
          <td><input id="rateTitle" class="rate-title-input" placeholder="이름을 입력하세요"></td>
          <th>요일</th>
          <td colspan="3">
            <div id="rateDays" class="rate-days-row"></div>
          </td>
        </tr>
        <tr>
          <th>최소/최대인원</th>
          <td colspan="2">
            <div class="rate-member-row">
              <input id="rateConfirm" value="1"><span>명 이상 → 출발확정</span>
              <input id="rateClose" value="30"><span>명 이상 → 예약마감</span>
            </div>
          </td>
          <th>상태</th>
          <td colspan="2"><div id="rateStatus" class="rate-status-row"></div></td>
        </tr>
        <tr>
          <th>적용기간</th>
          <td colspan="5">
            <div class="rate-period-wrap">
              <div class="rate-term-row">
                <label><input type="radio" name="applyType" value="period" checked onchange="toggleApplyType()">기간으로 설정</label>
                <label><input type="radio" name="applyType" value="dates" onchange="toggleApplyType()">개별일자 ( 최대 10일 선택 가능 )</label>
              </div>
              <div id="periodBox" class="rate-range-row">
                <input id="rateStart" type="date" value="2026-07-01">
                <span>~</span>
                <input id="rateEnd" type="date" value="2026-08-31">
                <button class="btn" onclick="setRangeMonth(1)">1개월</button>
                <button class="btn" onclick="setRangeMonth(2)">2개월</button>
                <button class="btn" onclick="setRangeMonth(3)">3개월</button>
                <button class="btn" onclick="setRangeMonth(6)">6개월</button>
                <button class="btn" onclick="setYearEnd()">연말까지</button>
              </div>
              <div class="u-style-6b99de8b" id="datesBox">
                <div id="rateCalendarGrid" class="rate-calendar-grid"></div>
              </div>
            </div>
          </td>
        </tr>
      </table>
      <div id="selectedDateRow" class="rate-selected-row u-style-6b99de8b">
        <div class="rate-selected-label">선택날짜</div>
        <div id="selectedDates" class="rate-selected-tags"></div>
      </div>
      <div class="rate-price-area">
        <div class="table-wrap"><table class="price-grid"><thead id="ratePriceHead"></thead><tbody id="ratePriceBody"></tbody></table></div>
      </div>
    </div>
    <div class="modal-foot"><div class="rate-modal-actions"><button class="btn" onclick="closeModal('rateModal')">취소</button><button class="btn green" onclick="saveRateRule()">저장</button></div></div>
  </div>
</div>

<div id="optionModal" class="modal-backdrop">
  <div class="modal-box">
    <div class="modal-head"><span>옵션추가</span><button class="btn small" onclick="closeModal('optionModal')">닫기</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field"><label>옵션명</label><input id="optionName" placeholder="예) 독도 선택관광, 석식 변경, 객실 업그레이드"></div>
        <div class="field"><label>옵션 계산방식</label><select id="optionCalcType" onchange="syncOptionRequired()"><option value="per_booking">예약건당 1회</option><option value="per_selected_person">선택인원별</option><option value="per_all_people">전체인원 자동적용</option></select></div>
        <div class="field"><label>필수여부</label><div id="optionRequiredGroup" class="radio-field"><label><input type="radio" name="optionRequired" value="false" checked>선택</label><label><input type="radio" name="optionRequired" value="true">필수</label></div></div>
      </div>
      <h3>옵션항목</h3>
      <div id="optionItemRows"></div>
      <button class="btn small" onclick="addOptionItemRow()">항목추가</button>
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeModal('optionModal')">취소</button> <button class="btn green" onclick="saveOptionGroup()">저장</button></div>
  </div>
</div>
  <script src="./js/common.js"></script>
  <script src="./js/components.js"></script>
</body>
</html>
