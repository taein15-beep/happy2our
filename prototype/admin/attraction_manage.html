<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>관광지관리</title>
  <link rel="stylesheet" href="./css/common.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">
</head>
<body data-page="attraction_manage">
  <div class="app">
  <aside class="sidebar" data-include="./includes/sidebar.html"></aside>
<main>
      <header class="topbar"><strong>관광지관리</strong><span>윤호님 · 로그아웃</span></header>
      <div class="page">
        <div class="page-head">
          <div>
            <h1>관광지관리</h1>
            <div class="desc">일정표에서 사용하는 관광지를 카테고리별로 등록하고 관리합니다.</div>
          </div>
          <a class="btn" href="schedule_register.html">일정표등록으로</a>
        </div>

        <div class="layout">
          <section class="panel">
            <div class="panel-head"><span>카테고리</span><span class="badge">관리자 추가/삭제</span></div>
            <div class="panel-body">
              <div class="category-form">
                <input id="newCategoryName" placeholder="카테고리명">
                <button class="btn green" onclick="addCategory()">추가</button>
              </div>
              <div id="categoryList" class="category-list">
                <div class="category-item active" data-count="6" onclick="selectCategory(this)"><span class="category-name">자연/공원</span><span class="category-count">6개</span><button class="btn small red" onclick="deleteCategory(event,this)">삭제</button></div>
                <div class="category-item" data-count="4" onclick="selectCategory(this)"><span class="category-name">역사/문화</span><span class="category-count">4개</span><button class="btn small red" onclick="deleteCategory(event,this)">삭제</button></div>
                <div class="category-item" data-count="3" onclick="selectCategory(this)"><span class="category-name">체험/테마</span><span class="category-count">3개</span><button class="btn small red" onclick="deleteCategory(event,this)">삭제</button></div>
                <div class="category-item" data-count="2" onclick="selectCategory(this)"><span class="category-name">맛집/쇼핑</span><span class="category-count">2개</span><button class="btn small red" onclick="deleteCategory(event,this)">삭제</button></div>
              </div>
              <p class="hint">카테고리를 선택하면 우측 관광지 목록과 등록 폼에 반영됩니다.</p>
            </div>
          </section>

          <section class="panel">
            <div class="panel-head"><span>관광지목록</span></div>
            <div class="panel-body">
              <div class="filter-row">
                <select id="filterCategory" onchange="filterAttractions()"><option>자연/공원</option><option>역사/문화</option><option>체험/테마</option><option>맛집/쇼핑</option></select>
                <input id="attractionSearch" placeholder="관광지명 검색">
                <button class="btn" onclick="filterAttractions()">검색</button>
              </div>

              <table class="table">
                <thead><tr><th>관광지명</th><th>관리</th></tr></thead>
                <tbody id="attractionTable">
                  <tr data-category="자연/공원" data-desc="유구천을 따라 조성된 수국정원"><td><button class="attraction-link" onclick="editAttractionRow(this)">공주 유구 색동수국정원</button></td><td class="center"><button class="btn small red" onclick="deleteAttractionRow(this)">삭제</button></td></tr>
                  <tr data-category="역사/문화" data-desc="계룡산 자락의 대표 사찰"><td><button class="attraction-link" onclick="editAttractionRow(this)">계룡산 동학사</button></td><td class="center"><button class="btn small red" onclick="deleteAttractionRow(this)">삭제</button></td></tr>
                  <tr data-category="역사/문화" data-desc="백제 역사문화 관광지"><td><button class="attraction-link" onclick="editAttractionRow(this)">공산성</button></td><td class="center"><button class="btn small red" onclick="deleteAttractionRow(this)">삭제</button></td></tr>
                </tbody>
              </table>
              <div class="list-actions">
                <button class="btn green" onclick="resetAttractionForm()">+ 추가</button>
                <button class="btn blue" onclick="openTourApiData()">관광공사데이터</button>
              </div>
            </div>
          </section>

          <section class="panel register-panel">
            <div class="panel-head"><span>등록 및 수정</span></div>
            <div class="panel-body">
              <div class="attraction-form">
                <div class="form-row">
                  <div><label>카테고리</label><select id="formCategory"><option>자연/공원</option><option>역사/문화</option><option>체험/테마</option><option>맛집/쇼핑</option></select></div>
                  <div><label>관광지명</label><input id="formAttractionName"></div>
                </div>
                <div>
                  <label>관광지 설명</label>
                  <div class="editor-toolbar"><span>파일</span><span>편집</span><span>보기</span><span>삽입</span><span>서식</span><span>B</span><span>I</span></div>
                  <textarea id="formDescription"></textarea>
                </div>
                <div>
                  <label>이미지 등록</label>
                  <div class="image-upload-box">
                    <input id="formImages" type="file" accept="image/*" multiple onchange="previewImages(this)">
                    <p class="hint">여러 이미지를 한 번에 선택할 수 있습니다.</p>
                    <div id="imagePreviewGrid" class="image-preview-grid">
                      <span class="image-preview">이미지1</span>
                      <span class="image-preview">이미지2</span>
                      <span class="image-preview">이미지3</span>
                      <span class="image-preview">이미지4</span>
                    </div>
                  </div>
                </div>
                <div class="u-style-54c2afb7"><button id="formSubmitButton" class="btn green" onclick="saveAttraction()">신규등록</button></div>
              </div>
            </div>
          </section>
        </div>
      </div>
    </main>
  </div>
  <script src="./js/common.js"></script>
  <script src="./js/components.js"></script>
</body>
</html>
